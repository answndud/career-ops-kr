<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Career Ops KR Web{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f4f6;
        --surface: #ffffff;
        --surface-muted: #f5f5f5;
        --surface-soft: #fbfbfb;
        --ink: #111111;
        --muted: #6b7280;
        --line: #d0d5db;
        --line-strong: #b3bac2;
        --emphasis: #23262b;
        --emphasis-strong: #17191c;
        --emphasis-text: #f9fafb;
        --ok-bg: #eef4ef;
        --ok-ink: #335942;
        --warn-bg: #faf4e8;
        --warn-ink: #775d2f;
        --danger-bg: #f8eded;
        --danger-ink: #7a3c3c;
        --radius-sm: 8px;
        --radius-md: 10px;
        --radius-lg: 12px;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-7: 32px;
        --space-8: 40px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: var(--space-4) var(--space-6);
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      .shell {
        max-width: 1360px;
        margin: 0 auto;
      }
      .brand {
        display: flex;
        justify-content: space-between;
        gap: var(--space-4);
        align-items: flex-start;
      }
      .brand h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .metric {
        font-size: 30px;
        font-weight: 800;
        line-height: 1.1;
      }
      .muted { color: var(--muted); }
      nav {
        display: flex;
        gap: var(--space-2);
        flex-wrap: wrap;
        margin-top: var(--space-4);
      }
      nav a {
        text-decoration: none;
        color: var(--ink);
        font-weight: 600;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--line);
        background: var(--surface);
      }
      nav a.active {
        color: var(--emphasis-text);
        background: var(--emphasis);
        border-color: var(--emphasis);
      }
      nav a:hover {
        background: var(--surface-muted);
      }
      main {
        max-width: 1360px;
        margin: 0 auto;
        padding: var(--space-6);
      }
      .page-stack {
        display: grid;
        gap: var(--space-6);
      }
      .section-stack {
        display: grid;
        gap: var(--space-4);
      }
      .grid { display: grid; gap: 16px; }
      .grid.two { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
      .grid.three { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .grid.four { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .card {
        background: var(--surface);
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-lg);
        padding: var(--space-5);
      }
      .subcard {
        background: var(--surface);
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-md);
        padding: var(--space-4);
      }
      .pill {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--surface-muted);
        color: var(--muted);
        border: 1px solid var(--line);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      h1, h2, h3 {
        margin-top: 0;
        margin-bottom: var(--space-3);
        line-height: 1.2;
        letter-spacing: -0.015em;
      }
      h1 { font-size: 30px; font-weight: 800; }
      h2 { font-size: 18px; font-weight: 700; }
      h3 { font-size: 15px; font-weight: 700; }
      p, li, label, td, th {
        line-height: 1.5;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        background: var(--emphasis);
        color: var(--emphasis-text);
        font-size: 12px;
        font-weight: 700;
        border-bottom: 0;
      }
      th, td {
        text-align: left;
        vertical-align: top;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }
      tbody tr:hover {
        background: var(--surface-soft);
      }
      .stack {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
      }
      .hero {
        padding: var(--space-7);
        border-radius: var(--radius-lg);
        border: 1px solid var(--line-strong);
        background: var(--surface);
      }
      .hero h1 { margin-bottom: var(--space-2); }
      .hero .lede {
        max-width: 72ch;
        font-size: 15px;
        color: var(--muted);
      }
      .page-intro {
        display: grid;
        gap: var(--space-3);
      }
      .hero-meta { margin-bottom: var(--space-3); }
      .hero-actions { margin-top: var(--space-4); }
      .stat {
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-md);
        background: var(--surface);
        padding: var(--space-4);
      }
      .stat .label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 700;
      }
      .stat .value {
        font-size: 30px;
        font-weight: 800;
        margin-top: var(--space-2);
      }
      .stat .hint {
        font-size: 13px;
        color: var(--muted);
        margin-top: var(--space-2);
      }
      input, textarea, select, button { width: 100%; font: inherit; }
      input, textarea, select {
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        background: var(--surface);
        color: var(--ink);
        transition: border-color 120ms ease;
      }
      input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--emphasis);
      }
      textarea { min-height: 120px; resize: vertical; }
      button {
        border: 1px solid var(--emphasis);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        background: var(--emphasis);
        color: var(--emphasis-text);
        font-weight: 700;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      }
      button:hover {
        background: var(--emphasis-strong);
        border-color: var(--emphasis-strong);
      }
      button.secondary {
        background: var(--surface);
        color: var(--ink);
        border-color: var(--line-strong);
      }
      button.secondary:hover,
      button.ghost:hover {
        background: var(--surface-muted);
      }
      button.ghost {
        background: var(--surface-soft);
        color: var(--ink);
        border-color: var(--line);
      }
      button.danger {
        background: var(--danger-ink);
        border-color: var(--danger-ink);
        color: var(--emphasis-text);
      }
      button.danger:hover {
        background: #6a3333;
        border-color: #6a3333;
      }
      button:disabled { opacity: 0.55; cursor: wait; }
      pre, code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: var(--surface-muted);
        border-radius: var(--radius-sm);
      }
      pre {
        white-space: pre-wrap;
        padding: 14px;
        overflow-x: auto;
        border: 1px solid var(--line);
      }
      code { padding: 2px 6px; }
      .actions { display: flex; flex-wrap: wrap; gap: var(--space-2); }
      .actions > * { width: auto; }
      .notice {
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--line-strong);
        background: var(--surface);
      }
      .notice.ok { border-color: #cddacf; color: var(--ok-ink); background: var(--ok-bg); }
      .notice.warn { border-color: #ddd1b8; color: var(--warn-ink); background: var(--warn-bg); }
      .notice.error { border-color: #dec8c8; color: var(--danger-ink); background: var(--danger-bg); }
      .spacer { height: 8px; }
      .hidden { display: none; }
      .inline-form { display: grid; gap: 10px; }
      .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .toolbar > * { width: auto; }
      .field { display: grid; gap: 6px; }
      .span-full { grid-column: 1 / -1; }
      .checkbox-inline {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
      }
      .checkbox-inline input { width: auto; }
      a.link {
        color: var(--ink);
        font-weight: 600;
      }
      a.link:hover {
        text-decoration: underline;
      }
      .table-actions {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
      }
      .table-actions > * { width: auto; }
      .list-compact {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: var(--space-3);
      }
      .list-compact li {
        padding: 12px 14px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-md);
        background: var(--surface);
      }
      .list-compact .title { font-weight: 700; }
      .list-compact .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .mini-pills {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-2);
      }
      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--surface-muted);
        border: 1px solid var(--line);
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }
      .status-chip.ok {
        background: var(--ok-bg);
        border-color: #cddacf;
        color: var(--ok-ink);
      }
      .status-chip.warn {
        background: var(--warn-bg);
        border-color: #ddd1b8;
        color: var(--warn-ink);
      }
      .status-chip.error {
        background: var(--danger-bg);
        border-color: #dec8c8;
        color: var(--danger-ink);
      }
      .meta-pair {
        display: grid;
        gap: 2px;
        margin-top: var(--space-2);
      }
      .kv-list {
        display: grid;
        gap: var(--space-2);
      }
      .kv-row {
        display: grid;
        gap: 2px;
      }
      .kv-label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .callout {
        border-radius: var(--radius-md);
        border: 1px solid var(--line-strong);
        padding: 14px 16px;
        background: var(--surface);
      }
      .callout strong { color: var(--ink); }
      .kpi-grid {
        display: grid;
        gap: var(--space-3);
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }
      .kpi-box {
        padding: var(--space-4);
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-md);
        background: var(--surface);
      }
      .kpi-box .label {
        margin-bottom: var(--space-2);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .section-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--space-3);
        margin-bottom: var(--space-4);
      }
      .section-header > div:last-child {
        flex: 1;
      }
      .section-header h1,
      .section-header h2,
      .section-header h3 {
        margin-bottom: var(--space-2);
      }
      .table-frame {
        border: 1px solid var(--line-strong);
        border-radius: var(--radius-md);
        overflow: hidden;
        background: var(--surface);
      }
      .table-frame table {
        margin: 0;
      }
      .source-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-4);
      }
      .source-tab {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--surface);
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
      }
      .source-tab.active {
        background: var(--emphasis);
        border-color: var(--emphasis);
        color: var(--emphasis-text);
      }
      .record-grid {
        display: grid;
        gap: var(--space-3);
      }
      .record-line {
        display: flex;
        justify-content: space-between;
        gap: var(--space-3);
        padding-bottom: var(--space-2);
        border-bottom: 1px solid var(--line);
      }
      .record-line:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .record-label {
        color: var(--muted);
        min-width: 110px;
        font-size: 13px;
        font-weight: 600;
      }
      .result-panel details {
        margin-top: var(--space-4);
      }
      .result-panel summary {
        cursor: pointer;
        font-weight: 600;
      }
      .result-panel .link-stack {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-top: var(--space-2);
      }
      .result-panel .path-list {
        display: grid;
        gap: var(--space-1);
        margin-top: var(--space-2);
      }
      .result-panel .guidance-list {
        margin: 0;
        padding-left: 18px;
        display: grid;
        gap: 4px;
      }
      .result-panel .guidance-block {
        display: grid;
        gap: var(--space-2);
        margin-top: var(--space-3);
      }
      .table-note {
        color: var(--muted);
        font-size: 13px;
      }
      .plain-list {
        margin: 0;
        padding-left: 18px;
      }
      .plain-list li + li {
        margin-top: var(--space-2);
      }
      @media (max-width: 900px) {
        header,
        main {
          padding-left: var(--space-4);
          padding-right: var(--space-4);
        }
        .brand {
          flex-direction: column;
        }
        .hero {
          padding: var(--space-5);
        }
        h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="shell">
        <div class="brand">
          <div>
            <h1>Career Ops KR Web</h1>
            <div class="muted">Python 기반 optional product surface for search, resume, tracker, and local operations.</div>
          </div>
          <div class="notice">
            CLI와 파일 기반 core는 그대로 유지됩니다. 이 웹 표면은 로컬 SQLite sidecar를 쓰는 선택 기능입니다.
          </div>
        </div>
        <nav>
          <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">홈</a>
          <a href="/search" class="{% if request.url.path.startswith('/search') %}active{% endif %}">검색</a>
          <a href="/follow-ups" class="{% if request.url.path.startswith('/follow-ups') %}active{% endif %}">팔로업</a>
          <a href="/resume" class="{% if request.url.path.startswith('/resume') %}active{% endif %}">이력서</a>
          <a href="/artifacts" class="{% if request.url.path.startswith('/artifacts') %}active{% endif %}">산출물</a>
          <a href="/tracker" class="{% if request.url.path.startswith('/tracker') %}active{% endif %}">트래커</a>
          <a href="/settings" class="{% if request.url.path.startswith('/settings') %}active{% endif %}">설정</a>
        </nav>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script>
      window.CareerOpsWeb = {
        escapeHtml(value) {
          return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;");
        },
        async copyText(value) {
          await navigator.clipboard.writeText(String(value || ""));
        },
        renderNotice(targetId, message, tone = "ok") {
          const target = document.getElementById(targetId);
          if (!target) return;
          target.className = `notice ${tone} result-panel`;
          target.innerHTML = `<div><strong>${this.escapeHtml(message)}</strong></div>`;
        },
        async quickFollowUpAction(targetId, jobId, action, label, reload = true) {
          if (!jobId || !action) return;
          const actionLabels = {
            today: "오늘로 이동",
            plus3: "3일 뒤로 이동",
            plus7: "7일 뒤로 이동",
            clear: "미설정으로 변경",
          };
          const actionLabel = actionLabels[action] || "갱신";
          this.renderNotice(targetId, `${label} 항목을 ${actionLabel} 중입니다...`, "warn");
          const response = await fetch(`/api/jobs/${jobId}/follow-up-quick`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({action}),
          });
          const data = await response.json();
          if (!response.ok) {
            this.renderNotice(targetId, data.detail || "팔로업 quick action 실패", "error");
            return;
          }
          this.renderNotice(targetId, `${label} 항목의 팔로업을 ${actionLabel}했습니다.`, "ok");
          if (reload) {
            window.setTimeout(() => window.location.reload(), 250);
          }
        },
        renderSavedJobResult(targetId, payload, message) {
          const target = document.getElementById(targetId);
          const detailUrl = payload.id ? `<a class="link" href="/tracker/${payload.id}">저장된 공고 보기</a>` : "";
          const jobUrl = payload.url ? `<a class="link" href="${this.escapeHtml(payload.url)}" target="_blank" rel="noreferrer">원문 공고 열기</a>` : "";
          target.className = "notice ok result-panel";
          target.innerHTML = `
            <div><strong>${this.escapeHtml(message || "저장 완료")}</strong></div>
            <div class="muted">${this.escapeHtml(payload.company || "-")} · ${this.escapeHtml(payload.position || payload.title || "-")}</div>
            <div class="link-stack">${detailUrl}${jobUrl}</div>
            <div class="path-list">
              <div class="muted">상태: ${this.escapeHtml(payload.status || "-")}</div>
              <div class="muted">출처: ${this.escapeHtml(payload.source || "-")}</div>
              <div class="muted">위치: ${this.escapeHtml(payload.location || "-")}</div>
            </div>
          `;
        },
        renderBuildResult(targetId, payload) {
          const target = document.getElementById(targetId);
          const htmlUrl = payload.html_url ? `<a class="link" href="${this.escapeHtml(payload.html_url)}" target="_blank" rel="noreferrer">HTML 열기</a>` : "";
          const pdfUrl = payload.pdf_url ? `<a class="link" href="${this.escapeHtml(payload.pdf_url)}" target="_blank" rel="noreferrer">PDF 열기</a>` : "";
          const detailUrl = payload.job_id ? `<a class="link" href="/tracker/${payload.job_id}">저장된 공고 보기</a>` : "";
          const guidance = payload.tailoring_guidance || {};
          const selection = guidance.selection || {};
          const focus = guidance.focus || {};
          const guidanceHtml = [selection.selected_domain, selection.selected_role_profile, selection.selected_target_role].some(Boolean)
            ? `
              <div class="guidance-block">
                <div><strong>Tailoring Guidance</strong></div>
                <div class="mini-pills">
                  ${selection.selected_domain ? `<span class="status-chip">${this.escapeHtml(selection.selected_domain)}</span>` : ""}
                  ${selection.selected_role_profile ? `<span class="status-chip">${this.escapeHtml(selection.selected_role_profile)}</span>` : ""}
                  ${selection.total_score ? `<span class="status-chip">${this.escapeHtml(String(selection.total_score))}</span>` : ""}
                </div>
                ${selection.selected_target_role ? `<div class="muted">타깃 역할: ${this.escapeHtml(selection.selected_target_role)}</div>` : ""}
                ${(focus.skills_to_emphasize || []).length ? `<div><strong>강조 기술</strong><ul class="guidance-list">${focus.skills_to_emphasize.slice(0, 5).map((item) => `<li>${this.escapeHtml(item)}</li>`).join("")}</ul></div>` : ""}
                ${(focus.notes || []).length ? `<div><strong>메모</strong><ul class="guidance-list">${focus.notes.slice(0, 3).map((item) => `<li>${this.escapeHtml(item)}</li>`).join("")}</ul></div>` : ""}
              </div>
            `
            : "";
          target.className = "notice ok result-panel";
          target.innerHTML = `
            <div><strong>생성 완료</strong></div>
            <div class="muted">맞춤 이력서 산출물이 생성되었습니다.</div>
            <div class="link-stack">${htmlUrl}${pdfUrl}${detailUrl}</div>
            <div class="path-list">
              <div class="muted">job: ${this.escapeHtml(payload.job_path || "-")}</div>
              <div class="muted">report: ${this.escapeHtml(payload.report_path || "-")}</div>
              <div class="muted">context: ${this.escapeHtml(payload.context_path || "-")}</div>
            </div>
            ${guidanceHtml}
          `;
        },
      };
    </script>
  </body>
</html>
