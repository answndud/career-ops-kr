  - name: Kakao
    careers_url: https://careers.kakao.com/index
    enabled: true
  - name: Naver
    careers_url: https://recruit.navercorp.com/
    enabled: true
  - name: Coupang
    careers_url: https://www.coupang.jobs/kr/
    enabled: true
  - name: Riiid
    careers_url: https://riiid.com/careers
    enabled: true
